<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WA MASTER - ARQUIVOS LIBERADOS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --wa-green: #075e54; --wa-light: #25d366; --bg: #d1d7db; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--wa-green); color: white; padding: 12px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: var(--wa-green); }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: rgba(255,255,255,0.6); cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom-color: white; }

        .controls { background: #f0f2f5; padding: 10px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #ccc; }
        .btn-import { background: var(--wa-light) !important; color: #000; width: 100%; padding: 18px; display: block; text-align: center; border-radius: 8px; font-weight: bold; text-decoration: none; cursor: pointer; font-size: 16px; border: none; }

        main { flex: 1; overflow-y: auto; background: #e5ddd5; position: relative; }
        .view { display: none; padding: 15px; flex-direction: column; gap: 10px; }
        .view.active { display: flex; }

        .msg { background: white; padding: 10px; border-radius: 8px; max-width: 85%; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .msg.me { align-self: flex-end; background: #dcf8c6; }
        .sender { font-weight: bold; color: #075e54; font-size: 11px; display: block; margin-bottom: 4px; }
        .text { font-size: 14.5px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
        .time { font-size: 10px; color: #667781; text-align: right; margin-top: 4px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .grid-item { aspect-ratio: 1/1; background: #ddd; overflow: hidden; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        #loader { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .bar-wrap { width: 100%; background: #ddd; height: 10px; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #bar { background: var(--wa-light); width: 0%; height: 100%; transition: 0.1s; }
    </style>
</head>
<body>

    <header>
        <span style="font-weight:bold;">WA Pro Viewer</span>
        <button onclick="resetDB()" style="background:#ea4335; color:white; border:none; border-radius:5px; padding:5px 10px;">Limpar</button>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="tab('chat-view')">Mensagens</div>
        <div class="tab" onclick="tab('gallery-view')">Galeria</div>
    </div>

    <div class="controls">
        <label for="files" class="btn-import">📂 SELECIONAR ARQUIVOS (ZIP, TXT, FOTOS)</label>
        <input type="file" id="files" multiple style="display: none;">
        <input type="text" id="search" placeholder="🔍 Pesquisar na conversa..." onkeyup="renderChat(this.value)" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; outline:none;">
    </div>

    <main id="scroll-area">
        <div id="chat-view" class="view active"></div>
        <div id="gallery-view" class="view"><div class="grid" id="grid"></div></div>
    </main>

    <div id="loader">
        <h2 id="l-title">Processando...</h2>
        <div class="bar-wrap"><div id="bar"></div></div>
        <p id="l-info" style="font-weight:bold; color:var(--wa-green);"></p>
    </div>

    <script>
        let db;
        const DB_NAME = "WA_FINAL_LIBERADO";

        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            const ms = d.createObjectStore("msgs", { keyPath: "id", autoIncrement: true });
            ms.createIndex("hash", "hash", { unique: true });
            ms.createIndex("ts", "ts", { unique: false });
            d.createObjectStore("media", { keyPath: "name" });
        };
        req.onsuccess = e => { db = e.target.result; renderChat(); };

        function tab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(id).classList.add('active');
            if(id === 'gallery-view') renderGallery();
        }

        document.getElementById('files').onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            document.getElementById('loader').style.display = 'flex';
            let stats = { s: 0, d: 0, m: 0 };

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                document.getElementById('l-title').innerText = `Lendo: ${file.name}`;
                document.getElementById('bar').style.width = `${((i+1)/files.length)*100}%`;

                if (file.name.toLowerCase().endsWith('.zip')) {
                    const zip = await JSZip.loadAsync(file);
                    for (let path in zip.files) {
                        const fName = path.split('/').pop();
                        if (fName.toLowerCase().endsWith('.txt')) {
                            const res = await saveMsgs(parse(await zip.files[path].async("string")));
                            stats.s += res.s; stats.d += res.d;
                        } else if (fName.length > 3) {
                            await saveMedia(fName, await zip.files[path].async("blob"));
                            stats.m++;
                        }
                    }
                } else if (file.name.toLowerCase().endsWith('.txt')) {
                    const res = await saveMsgs(parse(await file.text()));
                    stats.s += res.s; stats.d += res.d;
                } else {
                    await saveMedia(file.name, file);
                    stats.m++;
                }
                document.getElementById('l-info').innerText = `${stats.s} novas / ${stats.d} duplicadas`;
            }
            document.getElementById('loader').style.display = 'none';
            renderChat();
        };

        function parse(txt) {
            const regex = /(\d{2})[.\/-](\d{2})[.\/-](\d{2,4}).*?(\d{2}:\d{2}).*?([^:]+):\s(.+)/;
            return txt.split("\n").map(l => {
                const m = l.match(regex);
                if (!m) return null;
                const ts = new Date(`${m[3].length==2?'20'+m[3]:m[3]}-${m[2]}-${m[1]}T${m[4]}:00`).getTime();
                const hash = btoa(unescape(encodeURIComponent(ts + m[5] + m[6].substring(0,50))));
                return { date: `${m[1]}/${m[2]}`, time: m[4], sender: m[5], text: m[6], ts, hash };
            }).filter(x => x);
        }

        async function saveMsgs(data) {
            return new Promise(r => {
                const tx = db.transaction("msgs", "readwrite");
                const store = tx.objectStore("msgs");
                let s=0, d=0;
                data.forEach(m => {
                    const q = store.add(m);
                    q.onsuccess = () => s++;
                    q.onerror = () => d++;
                });
                tx.oncomplete = () => r({s, d});
            });
        }

        function saveMedia(name, blob) {
            const tx = db.transaction("media", "readwrite");
            tx.objectStore("media").put({ name, data: blob });
        }

        async function renderChat(f = "") {
            const view = document.getElementById('chat-view');
            const tx = db.transaction(["msgs", "media"], "readonly");
            tx.objectStore("msgs").index("ts").getAll().onsuccess = async e => {
                let msgs = e.target.result;
                if(f) msgs = msgs.filter(m => m.text.toLowerCase().includes(f.toLowerCase()));
                view.innerHTML = "";
                const frag = document.createDocumentFragment();
                msgs.slice(-500).forEach(m => {
                    const div = document.createElement('div');
                    div.className = `msg ${m.sender.toLowerCase().includes('você')?'me':''}`;
                    div.innerHTML = `<span class="sender">${m.sender}</span><div class="text">${m.text}</div><div class="time">${m.date} ${m.time}</div>`;
                    frag.appendChild(div);
                });
                view.appendChild(frag);
                document.getElementById('scroll-area').scrollTop = view.scrollHeight;
            };
        }

        function renderGallery() {
            const grid = document.getElementById('grid');
            db.transaction("media").objectStore("media").getAll().onsuccess = e => {
                grid.innerHTML = "";
                e.target.result.forEach(item => {
                    if (item.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                        const img = document.createElement('img');
                        img.src = URL.createObjectURL(item.data);
                        const d = document.createElement('div');
                        d.className = 'grid-item';
                        d.appendChild(img);
                        grid.appendChild(d);
                    }
                });
            };
        }

        function resetDB() { if(confirm("Zerar tudo?")) { indexedDB.deleteDatabase(DB_NAME); location.reload(); } }
    </script>
</body>
</html>
