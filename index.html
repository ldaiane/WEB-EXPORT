<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Viewer Ultra - 20GB Ready</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <div class="brand">Web Export <span id="stats"></span></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar em GBs de conversa..." oninput="filterMessages()">
        </div>
        <div class="actions">
            <button onclick="clearHistory()" class="btn-clear">Limpar Tudo</button>
            <label for="fileInput" class="btn-import">📄 ZIP/TXT</label>
            <input type="file" id="fileInput" multiple accept=".txt,.zip" style="display: none;">
            <label for="folderInput" class="btn-import">📂 Pasta</label>
            <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;">
        </div>
    </header>

    <div id="loadingBar" style="display:none; height:4px; background:#25d366; width:0%; transition:0.3s;"></div>

    <main id="chatView">
        <div id="messages">
            <div class="welcome-msg">Pronto para grandes volumes. Importe seus arquivos de até 20GB.</div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
