<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Viewer - Histórico Permanente</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <div class="brand">Meu Histórico</div>
        <div class="actions">
            <button onclick="clearHistory()" class="btn-clear">Limpar Tudo</button>
            
            <label for="fileInput" class="btn-import">📄 Arquivos/ZIP</label>
            <input type="file" id="fileInput" multiple accept=".txt,.zip" style="display: none;">

            <label for="folderInput" class="btn-import">📂 Importar Pasta</label>
            <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;">
        </div>
    </header>

    <main id="chatView">
        <div id="messages">
            <div class="welcome-msg">Histórico vazio. Importe arquivos, ZIPs ou pastas do WhatsApp.</div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
