<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visualizador WhatsApp 20GB</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #ece5dd; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #chatView { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 8px; border-radius: 7px; margin-bottom: 8px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sender { font-weight: bold; color: #075e54; font-size: 0.8em; }
        .time { font-size: 0.7em; color: #999; text-align: right; }
        img, video { max-width: 100%; border-radius: 5px; margin-top: 5px; }
        
        /* Tela de Loading */
        #loadingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); 
                          color:white; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #25d366; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bg { width: 80%; background: #333; height: 10px; border-radius: 5px; margin-top: 15px; }
        #progressBar { width: 0%; background: #25d366; height: 100%; border-radius: 5px; transition: 0.2s; }
    </style>
</head>
<body>
    <header>
        <div>WhatsApp Viewer <span id="stats"></span></div>
        <input type="file" id="fileInput" multiple>
        <button onclick="clearHistory()">Limpar Banco</button>
    </header>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p id="statusLabel">Lendo arquivo...</p>
        <div class="progress-bg"><div id="progressBar"></div></div>
        <p id="errorLabel" style="color:#ff5252; display:none;"></p>
    </div>

    <main id="chatView"><div id="messages"></div></main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
