<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>WhatsApp Multi-ZIP Viewer</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #efe7dd; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #drop-zone { background: white; margin: 20px; padding: 40px; border: 3px dashed #075e54; border-radius: 15px; text-align: center; cursor: pointer; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { background: white; margin: 6px 0; padding: 12px; border-radius: 10px; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); align-self: flex-start; }
        img, video { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        audio { width: 100%; margin-top: 10px; }
        .btn-gerar { background: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin: 10px; display: none; }
    </style>
</head>
<body>

<header>EXTRAIR WHATSAPP (MULTI-ZIP)</header>

<div id="drop-zone">
    <strong>CLIQUE PARA SELECIONAR UM OU VÁRIOS ZIPS</strong>
    <input type="file" id="file-input" accept=".zip" multiple style="display:none">
</div>

<center><button id="btn-gerar" class="btn-gerar">GERAR CONVERSA UNIFICADA</button></center>

<div id="chat"></div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const btnGerar = document.getElementById('btn-gerar');
    const chat = document.getElementById('chat');

    let allMessages = new Map();
    let mediaUrls = new Map();

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const files = e.target.files;
        if (!files.length) return;
        btnGerar.style.display = "block";
        
        for (const file of files) {
            const zip = await JSZip.loadAsync(file);
            for (let path in zip.files) {
                const entry = zip.files[path];
                if (entry.dir) continue;
                const fileName = path.split('/').pop().toLowerCase();

                if (fileName.endsWith('.txt')) {
                    const content = await entry.async("string");
                    content.split('\n').forEach(line => {
                        if (line.trim().length > 5) allMessages.set(line.trim(), line.trim());
                    });
                } else if (fileName.match(/\.(jpg|jpeg|png|webp|mp3|mp4|opus|ogg|m4a|mov)$/i)) {
                    const blob = await entry.async("blob");
                    mediaUrls.set(fileName, URL.createObjectURL(blob));
                }
            }
        }
        alert("Arquivos carregados! Clique em GERAR.");
    };

    btnGerar.onclick = () => {
        chat.innerHTML = "";
        const sorted = Array.from(allMessages.values()).sort();
        sorted.forEach(line => {
            const div = document.createElement('div');
            div.className = 'msg';
            const match = line.match(/([\w\-. ]+\.(?:jpg|jpeg|png|webp|mp3|mp4|opus|ogg|pdf|m4a|mov))/i);
            let mediaHtml = "";
            if (match) {
                const name = match[0].trim().toLowerCase();
                const url = mediaUrls.get(name);
                if (url) {
                    if (name.match(/\.(jpg|jpeg|png|webp)$/)) mediaHtml = `<img src="${url}">`;
                    else if (name.match(/\.(mp3|opus|ogg|m4a)$/)) mediaHtml = `<audio controls src="${url}"></audio>`;
                    else if (name.match(/\.(mp4|mov)$/)) mediaHtml = `<video controls src="${url}"></video>`;
                }
            }
            div.innerHTML = `<span>${line}</span>${mediaHtml}`;
            chat.appendChild(div);
        });
        dropZone.style.display = "none";
        btnGerar.style.display = "none";
    };
</script>
</body>
</html>
