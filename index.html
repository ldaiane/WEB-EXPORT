<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Viewer Ultra - 20GB</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075e54">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <div class="brand">Chat View <small id="stats"></small></div>
            <button onclick="clearHistory()" class="btn-clear">Limpar Tudo</button>
        </div>
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar..." oninput="filterMessages()">
                <input type="date" id="dateFilter" onchange="filterByDate()">
            </div>
            <div class="import-box">
                <label for="fileInput" class="btn-import">📄 Selecionar Arquivos/ZIP</label>
                <input type="file" id="fileInput" multiple style="display: none;">
                <label for="folderInput" class="btn-import hide-mobile">📂 Pasta</label>
                <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;">
            </div>
        </div>
    </header>

    <div id="loadingBarContainer" style="display:none; background:#ccc; height:5px; width:100%;">
        <div id="loadingBar" style="height:100%; background:#25d366; width:0%; transition: 0.1s;"></div>
    </div>

    <main id="chatView">
        <div id="messages">
            <div class="welcome-msg">Selecione o arquivo .txt ou .zip para carregar.</div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
