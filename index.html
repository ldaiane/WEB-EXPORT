<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meus Chats</title>
    <style>
        :root { --whatsapp-green: #128C7E; --whatsapp-bg: #e5ddd5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
               margin: 0; background: var(--whatsapp-bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--whatsapp-green); color: white; padding: 15px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 5px; }
        
        button, .btn-import { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; 
                               border-radius: 5px; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-danger { background: #d9534f; }

        #chatView { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px; border-radius: 10px; margin-bottom: 8px; 
               max-width: 85%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .msg.me { align-self: flex-end; background: #dcf8c6; }
        
        .sender { font-weight: bold; color: #075e54; font-size: 12px; margin-bottom: 3px; }
        .text { font-size: 15px; line-height: 1.4; color: #303030; word-wrap: break-word; }
        .time { font-size: 10px; color: #888; text-align: right; margin-top: 5px; }

        img, video { max-width: 100%; border-radius: 8px; margin-top: 8px; display: block; }
        audio { width: 100%; margin-top: 8px; }

        /* Overlay de carregamento para Celular */
        #loadingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; 
                          display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #25d366; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar { width: 100%; background: #333; height: 8px; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        #progress { background: #25d366; width: 0%; height: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <header>
        <div class="top-row">
            <div style="font-weight: bold;">WhatsApp History <span id="stats"></span></div>
            <div class="btn-group">
                <button onclick="exportBackup()">Backup</button>
                <button onclick="clearHistory()" class="btn-danger">Limpar</button>
            </div>
        </div>
        <label for="fileInput" class="btn-import" style="text-align:center; background:#25d366;">➕ Selecionar ZIP de 20GB</label>
        <input type="file" id="fileInput" multiple style="display: none;">
    </header>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <h3 id="statusLabel">Lendo arquivos...</h3>
        <p>Não feche esta aba. Processando 20GB...</p>
        <div class="progress-bar"><div id="progress"></div></div>
    </div>

    <main id="chatView"><div id="messages"></div></main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
