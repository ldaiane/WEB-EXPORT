<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Export - WhatsApp Viewer</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075e54">
</head>
<body>

    <header>
        <h1 id="appTitle">Web Export</h1>
        <input type="file" id="fileInput" multiple accept=".txt,.zip,image/*,video/*,audio/*">
    </header>

    <main>
        <div id="chatList">
            <p class="empty-msg">Selecione um arquivo .txt ou .zip do WhatsApp para começar.</p>
        </div>

        <div id="chatView" style="display: none;">
            <div class="chat-header">
                <button onclick="closeChat()">←</button>
                <span id="chatTitle">Nome do Chat</span>
            </div>
            <div id="messages"></div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
